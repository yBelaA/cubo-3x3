<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cubo 3x3 3D - Cinza Gelo sem Reflexos e sem Sombras</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 100;
            backdrop-filter: blur(5px);
            font-size: 14px;
            letter-spacing: 1px;
        }
        @media (max-width: 600px) {
            #info { font-size: 10px; top: 10px; left: 10px; }
        }
    </style>
</head>
<body>
    <div id="info">
        🖱️ Arraste o mouse para girar 360° | Cubo 3x3x3 | Cinza gelo fosco - Sem sombras
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Configuração da cena, câmera e renderizadores ---
        const scene = new THREE.Scene();
        // Fundo neutro escuro para destacar o cubo cinza gelo
        scene.background = new THREE.Color(0x0a0a1a);
        
        // Câmera perspectiva
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 4, 6);
        camera.lookAt(0, 0, 0);
        
        // Renderizador WebGL
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        // Desabilitar completamente o mapa de sombras para não haver nenhum efeito de sombra
        renderer.shadowMap.enabled = false;
        document.body.appendChild(renderer.domElement);
        
        // --- Controles Orbitais para visualização 360° com mouse ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;          // Efeito inercial suave
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.2;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0, 0);
        
        // --- LUZES: Iluminação totalmente difusa, sem criar sombras ou reflexos ---
        // Usaremos apenas luz ambiente e luzes direcionais que não projetam sombras
        // Todas as luzes têm shadow-map desabilitado individualmente também
        
        // Luz ambiente principal: iluminação uniforme e suave
        const ambientLight = new THREE.AmbientLight(0x8a9bb5, 0.85);
        scene.add(ambientLight);
        
        // Luz direcional frontal/superior suave - sem sombras
        const frontLight = new THREE.DirectionalLight(0xffffff, 0.6);
        frontLight.position.set(2, 3, 2);
        frontLight.castShadow = false;  // Garantir que não projeta sombra
        scene.add(frontLight);
        
        // Luz direcional traseira para iluminar as faces traseiras de forma uniforme
        const backLight = new THREE.DirectionalLight(0xaabbdd, 0.5);
        backLight.position.set(-2, 1, -3);
        backLight.castShadow = false;
        scene.add(backLight);
        
        // Luz direcional lateral direita
        const rightLight = new THREE.DirectionalLight(0xccddff, 0.45);
        rightLight.position.set(3, 0.5, 1);
        rightLight.castShadow = false;
        scene.add(rightLight);
        
        // Luz direcional lateral esquerda
        const leftLight = new THREE.DirectionalLight(0xccddff, 0.45);
        leftLight.position.set(-3, 0.5, 1);
        leftLight.castShadow = false;
        scene.add(leftLight);
        
        // Luz vinda de baixo para iluminar as faces inferiores sem criar sombras
        const bottomLight = new THREE.PointLight(0x88aacc, 0.25);
        bottomLight.position.set(0, -2.5, 0);
        bottomLight.castShadow = false;
        scene.add(bottomLight);
        
        // Luz vinda de cima para iluminar o topo
        const topLight = new THREE.PointLight(0xcad2e0, 0.3);
        topLight.position.set(0, 3, 0);
        topLight.castShadow = false;
        scene.add(topLight);
        
        // --- Criação do Cubo 3x3x3 com espaçamento entre os pequenos cubos ---
        // Cada cubo individual terá tamanho 0.9, espaçamento de 0.1 entre eles
        // Distância entre centros = 1.0
        
        const cubeSize = 0.9;
        const spacing = 0.1;
        const step = cubeSize + spacing; // = 1.0
        
        // Posições dos centros: -1, 0, 1
        const positions = [-1, 0, 1];
        
        // Material: cinza gelo fosco, SEM QUALQUER REFLEXO ou especularidade
        // Roughness máximo (1.0) e metalness zero garantem superfície totalmente difusa
        const iceGrayMaterial = new THREE.MeshStandardMaterial({
            color: 0xcad2e0,        // Cinza gelo claro com tom azulado suave
            emissive: 0x000000,
            roughness: 1.0,         // Máximo fosco - zero reflexos
            metalness: 0.0,         // Nada metálico
            flatShading: false,
            side: THREE.DoubleSide   // Garante visibilidade mesmo em ângulos extremos
        });
        
        // Grupo para organizar todos os cubos
        const bigCubeGroup = new THREE.Group();
        
        // Criar 27 cubos (3x3x3)
        for (let i = 0; i < positions.length; i++) {
            const x = positions[i];
            for (let j = 0; j < positions.length; j++) {
                const y = positions[j];
                for (let k = 0; k < positions.length; k++) {
                    const z = positions[k];
                    
                    const geometry = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
                    const smallCube = new THREE.Mesh(geometry, iceGrayMaterial);
                    
                    // Posicionar com espaçamento exato
                    smallCube.position.set(x * step, y * step, z * step);
                    
                    // Desabilitar sombras em cada cubo individualmente (redundante mas garantia)
                    smallCube.castShadow = false;
                    smallCube.receiveShadow = false;
                    
                    bigCubeGroup.add(smallCube);
                }
            }
        }
        
        scene.add(bigCubeGroup);
        
        // --- NENHUMA GRADE, NENHUM EFEITO DE SOLO, NENHUMA SOMBRA VISUAL ---
        // Removemos completamente qualquer elemento que pudesse criar sombra ou referência de chão
        
        // --- Animação e renderização contínua ---
        function animate() {
            // Atualizar controles para manter interatividade suave
            controls.update();
            
            // Renderizar cena sem sombras
            renderer.render(scene, camera);
            
            // Próximo frame
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // --- Ajuste de redimensionamento da janela ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Console para confirmação
        console.log('Cubo 3x3x3 criado com espaçamento, material cinza gelo fosco, sem sombras e sem reflexos. Câmera 360° com mouse.');
    </script>
</body>
</html>
